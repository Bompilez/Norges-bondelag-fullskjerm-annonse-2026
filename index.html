<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amedia Parallax</title>
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="stylesheet" href="https://use.typekit.net/xka5zpt.css" />

 <style>
   html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url(examples/assets/BernhardArnevik_001.webp);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #f9dc0a;
      font-family: "open-sans", sans-serif;
      font-weight: 800;
      box-sizing: border-box;
    }

    #banner {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #clickLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: block;
      text-indent: -9999px;
      cursor: pointer;
    }

    #scale-wrapper {
      position: relative;
      padding-top: 20vh;
      transform-origin: top left;
      width: 100%;
    }

    #scale-wrapper::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 100%;
      height: 85vh;
      background: radial-gradient(
        ellipse 120% 42% at center,
        rgba(0, 0, 0, 0.34) 0%,
        rgba(0, 0, 0, 0.18) 32%,
        rgba(0, 0, 0, 0.08) 52%,
        rgba(0, 0, 0, 0) 72%
      );
      pointer-events: none;
    }

    #scale-wrapper::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -10vh;
      width: 100%;
      height: 55vh;
      background: radial-gradient(
        ellipse 120% 48% at center,
        rgba(0, 0, 0, 0.26) 0%,
        rgba(0, 0, 0, 0.14) 34%,
        rgba(0, 0, 0, 0.06) 54%,
        rgba(0, 0, 0, 0) 74%
      );
      pointer-events: none;
    }

    #top-heading {
        color: white;
        font-size: clamp(1.5rem, 4.2vw, 2rem);
        margin-bottom: 0.5rem;
        white-space: nowrap;
        line-height: 1;
    }

    .container {
        width: 100%;
        margin: 0 auto;
        box-sizing: border-box;
        position: relative;
        z-index: 1;
    }

    .wrapper-fullwidth {
      width: 100vw;
    }

    .yellow-bg {
        width: 100%;
        padding: 20px 0;
    }

    .top-content, .bottom-content {
      display: flex;
      justify-content: flex-start;
      width: 100%;
      box-sizing: border-box;
    }

    #top-logo {
      width: 242px;
      max-width: 100%;
      height: auto;
      display: block;
      flex-shrink: 0;
    }

    .top-content, .mid-content, .bottom-content {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    .top-content, .bottom-content {
         padding: 0 20px;
    }

    .mid-content {
      gap: 24px;
    }

    .mid-line {
      flex: 1;
      height: 200px;
      background-color: #f9dc0a;
    }



    .bottom-content img {
      width: 200px;
      height: auto;
      display: block;
      margin-top: 1rem;
    }

 </style>
</head>
<body>
  <div id="banner">
    <div
      id="clickLayer"
      role="button"
      aria-label="Klikk for å besøke kampanjen"
    >
      Klikk
    </div>

     <div id="scale-wrapper">
      <div class="wrapper-fullwidth">
        <div class="top-bg">
          <div class="container">
            <div class="top-content">
              <h2 id="top-heading">LANDBRUK ER FRAMTIDA</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="wrapper-fullwidth">
        <div class="yellow-bg" id="yellow-fill">
          <div class="container">
            <div class="mid-content">
              <div class="mid-line" aria-hidden="true"></div>
              <img id="top-logo" src="examples/assets/Mer enn mat_Logo_Gul.svg" alt="Logo">
              <div class="mid-line" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="wrapper-fullwidth">
        <div class="bottom-bg">
          <div class="container">
            <div class="bottom-content">
              <img id="bottom-logo" src="examples/assets/NB_Logo_Minimal_Hvit.svg" alt="Bondelaget logo">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

   <script>
    function getClickURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("click")
        ? decodeURIComponent(params.get("click")) + "https://www.bondelaget.no/merennmat/"
        : "https://www.bondelaget.no/merennmat/";
    }

    document.getElementById("clickLayer").onclick = function () {
      const target = getClickURL();
      window.open(target, "_blank");
    };

    function fitHeadingToSingleLine() {
      const heading = document.getElementById("top-heading");

      if (!heading) {
        return;
      }

      const parent = heading.parentElement;

      if (!parent) {
        return;
      }

      const maxFontSize = heading.dataset.maxFontSize
        ? parseFloat(heading.dataset.maxFontSize)
        : parseFloat(window.getComputedStyle(heading).fontSize);
      const minFontSize = 10;
      const availableWidth = parent.clientWidth;

      if (!heading.dataset.maxFontSize) {
        heading.dataset.maxFontSize = maxFontSize;
      }

      heading.style.fontSize = `${maxFontSize}px`;
      heading.style.display = "block";

      let nextFontSize = maxFontSize;

      while (heading.scrollWidth > availableWidth && nextFontSize > minFontSize) {
        nextFontSize -= 1;
        heading.style.fontSize = `${nextFontSize}px`;
      }
    }

    window.addEventListener("load", fitHeadingToSingleLine);
    window.addEventListener("resize", fitHeadingToSingleLine);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitHeadingToSingleLine);
    }

  </script>
</body>
</html>
